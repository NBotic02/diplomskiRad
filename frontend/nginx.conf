server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # =================================================================
    # API proxy — same routing as the Vite dev server. Each prefix
    # lands on the right Spring Boot container by service name.
    # =================================================================

    location ~ ^/api/v1/(customers|cases|case-categories|sla-policies|workflow-failures) {
        proxy_pass         http://case-service:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location ~ ^/api/v1/(agents|skills|departments|shifts|exceptions) {
        proxy_pass         http://employee-service:8082;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location ~ ^/api/v1/(notifications|notification-rules|notification-preferences) {
        proxy_pass         http://notification-service:8083;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location ~ ^/api/v1/(metrics|bottlenecks) {
        proxy_pass         http://analytics-service:8084;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # =================================================================
    # SPA fallback — every non-asset request returns index.html so that
    # client-side routing handles the URL.
    # =================================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed asset bundles aggressively; the filename changes on
    # every build so eternal max-age is safe.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
